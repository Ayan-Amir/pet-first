[tool.ruff]
line-length = 120
target-version = "py312"

# Exclude common directories that shouldn't be linted
exclude = [
    ".git",
    ".github",
    ".ruff_cache",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "migrations",
    "node_modules",
]

[tool.ruff.lint]
# Enable comprehensive rule sets
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "N",      # pep8-naming conventions
    "S",      # flake8-bandit (security)
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented-out code)
    "PL",     # Pylint
    "RUF",    # Ruff-specific rules
    "PERF",   # Perflint performance rules
    "FURB",   # refurb modernization rules
    "LOG",    # flake8-logging
    "G",      # flake8-logging-format
    "TID",    # flake8-tidy-imports
    "DJ",     # flake8-django
]

ignore = [
    "E501",     # line too long (handled by formatter)
    "G004",     # f-string in logging (we use structured logging with extra={})
    "PLR0913",  # too many arguments
    "PLR2004",  # magic value comparison
    "PLR0911",  # too many return statements
    "PLR0912",  # too many branches
    "PLR0915",  # too many statements
]

# Only allow import-sorting fixes; keep all other lint fixes disabled.
fixable = ["I"]
unfixable = []

[tool.ruff.lint.isort]
known-first-party = ["petsfirst"]
lines-after-imports = 2
lines-between-types = 1

[tool.ruff.lint.per-file-ignores]
# Tests can use assertions and magic values
"**/tests/**/*.py" = ["S101", "PLR2004", "ARG001"]
# Settings files can have unused imports and example configs
"**/settings/*.py" = ["F401", "ERA001"]
# Migrations have auto-generated code
"**/migrations/*.py" = ["E501", "ERA001"]
# Manage.py is auto-generated with intentional deferred imports
"manage.py" = ["E501", "PLC0415"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
